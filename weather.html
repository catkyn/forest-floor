<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Weather Widget</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #ffffff;
  --text: #24342F;
  --heading: #18231F;
  --support: #7E8B56;
  --cloud: #6F9DA1;
  --sun: #E8C36A;
  --rain: #18646D;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #191919;
    --text: #FAF6EF;
    --heading: #FAF6EF;
    --support: #DDE3CC;
    --cloud: #6F9DA1;
    --sun: #E8C36A;
    --rain: #6F9DA1;
  }
}

* {
  box-sizing: border-box;
}

html,
body {
  width: 100%;
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--text);
  font-family: "Manrope", sans-serif;
  overflow-x: hidden;
}

.weather-widget {
  width: 100%;
  max-width: 34rem;
  margin: 0 auto;
  padding: clamp(1rem, 4vw, 1.7rem);
  background: var(--bg);
  text-align: center;
}

.today-title {
  font-family: "Playfair Display", serif;
  font-size: clamp(2rem, 8vw, 3rem);
  line-height: 1;
  margin: 0 0 clamp(1rem, 4vw, 1.4rem);
  color: var(--heading);
  font-weight: 600;
}

.today-main {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: clamp(1.3rem, 6vw, 2.8rem);
  margin-bottom: clamp(2rem, 7vw, 3rem);
}

.today-icon {
  width: clamp(4.6rem, 18vw, 6.2rem);
  height: clamp(4.6rem, 18vw, 6.2rem);
  flex: 0 0 auto;
}

.today-info {
  text-align: center;
  min-width: 0;
}

.today-temp {
  font-family: "Playfair Display", serif;
  font-size: clamp(3.2rem, 13vw, 5rem);
  line-height: 0.85;
  color: var(--heading);
  margin: 0;
  font-weight: 600;
  letter-spacing: -0.04em;
}

.today-desc {
  margin-top: 0.35rem;
  font-size: clamp(0.8rem, 2.6vw, 0.95rem);
  color: var(--support);
  font-weight: 600;
}

.today-range {
  margin-top: 0.2rem;
  font-size: clamp(0.68rem, 2.2vw, 0.8rem);
  color: var(--support);
}

.forecast {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: clamp(0.25rem, 1.5vw, 0.65rem);
  width: 100%;
}

.day-card {
  min-width: 0;
  text-align: center;
}

.day-name {
  font-size: clamp(0.75rem, 2.4vw, 0.95rem);
  font-weight: 700;
  color: var(--support);
  margin-bottom: 0.45rem;
}

.day-icon {
  width: clamp(2rem, 7vw, 2.8rem);
  height: clamp(2rem, 7vw, 2.8rem);
  margin: 0 auto 0.6rem;
}

.day-temp {
  font-family: "Playfair Display", serif;
  font-size: clamp(1.3rem, 4.5vw, 1.75rem);
  color: var(--heading);
  line-height: 1;
  font-weight: 600;
}

.day-low {
  margin-top: 0.18rem;
  font-size: clamp(0.8rem, 2.6vw, 1rem);
  color: var(--support);
}

.loading,
.error {
  font-size: clamp(0.8rem, 2.2vw, 0.95rem);
  color: var(--support);
}

svg {
  display: block;
  width: 100%;
  height: 100%;
}

@media (max-width: 420px) {
  .weather-widget {
    padding: 0.9rem;
  }

  .today-main {
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .forecast {
    gap: 0.2rem;
  }

  .day-name {
    font-size: 0.72rem;
  }

  .day-temp {
    font-size: 1.15rem;
  }

  .day-low {
    font-size: 0.75rem;
  }
}

@media (max-width: 330px) {
  .today-main {
    gap: 0.75rem;
  }

  .today-icon {
    width: 4rem;
    height: 4rem;
  }

  .today-temp {
    font-size: 2.8rem;
  }

  .forecast {
    grid-template-columns: repeat(3, 1fr);
    row-gap: 1rem;
  }
}
</style>
</head>

<body>
<main class="weather-widget">
  <section id="today">
    <div class="loading">Loading today’s weather...</div>
  </section>

  <section class="forecast" id="forecast"></section>
</main>

<script>
const latitude = 52.969;
const longitude = -2.682;

const weatherDescriptions = {
  0: "Clear",
  1: "Mostly clear",
  2: "Partly cloudy",
  3: "Cloudy",
  45: "Foggy",
  48: "Foggy",
  51: "Light drizzle",
  53: "Drizzle",
  55: "Heavy drizzle",
  56: "Freezing drizzle",
  57: "Freezing drizzle",
  61: "Light rain",
  63: "Rain",
  65: "Heavy rain",
  66: "Freezing rain",
  67: "Freezing rain",
  71: "Light snow",
  73: "Snow",
  75: "Heavy snow",
  77: "Snow grains",
  80: "Light showers",
  81: "Showers",
  82: "Heavy showers",
  85: "Snow showers",
  86: "Heavy snow showers",
  95: "Thunderstorm",
  96: "Thunderstorm",
  99: "Thunderstorm"
};

function getIcon(code) {
  if ([0, 1].includes(code)) {
    return `
      <svg viewBox="0 0 100 100" aria-hidden="true">
        <circle cx="50" cy="50" r="21" fill="var(--sun)" />
        <g stroke="var(--sun)" stroke-width="7" stroke-linecap="round">
          <line x1="50" y1="9" x2="50" y2="22" />
          <line x1="50" y1="78" x2="50" y2="91" />
          <line x1="9" y1="50" x2="22" y2="50" />
          <line x1="78" y1="50" x2="91" y2="50" />
          <line x1="21" y1="21" x2="30" y2="30" />
          <line x1="70" y1="70" x2="79" y2="79" />
          <line x1="79" y1="21" x2="70" y2="30" />
          <line x1="30" y1="70" x2="21" y2="79" />
        </g>
      </svg>
    `;
  }

  if ([61, 63, 65, 80, 81, 82, 95, 96, 99].includes(code)) {
    return `
      <svg viewBox="0 0 100 100" aria-hidden="true">
        <path d="M30 62h42a18 18 0 0 0 0-36 24 24 0 0 0-46 8A16 16 0 0 0 30 62z" fill="var(--cloud)" />
        <g stroke="var(--rain)" stroke-width="6" stroke-linecap="round">
          <line x1="35" y1="72" x2="30" y2="84" />
          <line x1="52" y1="72" x2="47" y2="84" />
          <line x1="69" y1="72" x2="64" y2="84" />
        </g>
      </svg>
    `;
  }

  return `
    <svg viewBox="0 0 100 100" aria-hidden="true">
      <path d="M30 62h42a18 18 0 0 0 0-36 24 24 0 0 0-46 8A16 16 0 0 0 30 62z" fill="var(--cloud)" />
    </svg>
  `;
}

function dayName(dateString) {
  const date = new Date(dateString);
  return date.toLocaleDateString("en-GB", {
    weekday: "short"
  });
}

function roundTemp(temp) {
  return Math.round(temp);
}

async function loadWeather() {
  const todayBox = document.getElementById("today");
  const forecastBox = document.getElementById("forecast");

  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&daily=weather_code,temperature_2m_max,temperature_2m_min&current=temperature_2m,weather_code&timezone=Europe%2FLondon&forecast_days=7`;

    const response = await fetch(url);
    if (!response.ok) throw new Error("Weather unavailable");

    const data = await response.json();

    const currentCode = data.current.weather_code;
    const currentTemp = roundTemp(data.current.temperature_2m);
    const todayHigh = roundTemp(data.daily.temperature_2m_max[0]);
    const todayLow = roundTemp(data.daily.temperature_2m_min[0]);

    todayBox.innerHTML = `
      <h1 class="today-title">Today</h1>

      <div class="today-main">
        <div class="today-icon">${getIcon(currentCode)}</div>

        <div class="today-info">
          <p class="today-temp">${currentTemp}°</p>
          <div class="today-desc">${weatherDescriptions[currentCode] || "Weather"}</div>
          <div class="today-range">High ${todayHigh}° · Low ${todayLow}°</div>
        </div>
      </div>
    `;

    forecastBox.innerHTML = data.daily.time.slice(1, 7).map((date, index) => {
      const code = data.daily.weather_code[index + 1];
      const high = roundTemp(data.daily.temperature_2m_max[index + 1]);
      const low = roundTemp(data.daily.temperature_2m_min[index + 1]);

      return `
        <article class="day-card">
          <div class="day-name">${dayName(date)}</div>
          <div class="day-icon">${getIcon(code)}</div>
          <div class="day-temp">${high}°</div>
          <div class="day-low">${low}°</div>
        </article>
      `;
    }).join("");

  } catch (error) {
    todayBox.innerHTML = `<div class="error">Weather couldn’t load. Typical.</div>`;
    forecastBox.innerHTML = "";
  }
}

loadWeather();
</script>
</body>
</html>
